<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat vs Dog Classifier</title>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 36px 32px;
            max-width: 540px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 26px;
        }

        .subtitle {
            color: #777;
            margin-bottom: 24px;
            font-size: 14px;
        }

        input[type="file"] {
            margin: 12px 0 18px;
            font-size: 14px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.05s ease;
        }

        button:hover  { background: #43a047; }
        button:active { transform: translateY(1px); }

        /* ---------- Result block ---------- */
        .result {
            margin-top: 28px;
            padding: 22px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .result img.preview {
            max-width: 220px;
            max-height: 220px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .prediction {
            font-size: 28px;
            font-weight: 700;
            margin: 4px 0;
        }

        .prediction.cat { color: #e67e22; }
        .prediction.dog { color: #2980b9; }

        .confidence {
            font-size: 18px;
            color: #555;
            margin: 4px 0 12px;
        }

        .tier-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tier-badge.high { background: #d4edda; color: #155724; }
        .tier-badge.low  { background: #fff3cd; color: #856404; }

        .error {
            color: #b00020;
            background: #fdecea;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .try-again {
            display: inline-block;
            margin-top: 18px;
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
        }

        .try-again:hover { text-decoration: underline; }
    </style>
</head>

<body>

<div class="container">

    <h1>🐱 Cat vs Dog Classifier 🐶</h1>
    <div class="subtitle">Powered by MobileNetV2 transfer learning</div>

    {% if not prediction %}
        <!-- ---------- Upload form ---------- -->
        <form action="/predict" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <br>
            <button type="submit">Predict</button>
        </form>
    {% else %}
        <!-- ---------- Result panel ---------- -->
        <div class="result">
            <img class="preview" src="{{ image_url }}" alt="Uploaded image">

            <div class="prediction {{ prediction|lower }}">
                {% if prediction == "Cat" %}🐱{% else %}🐶{% endif %}
                {{ prediction }}
            </div>

            <div class="confidence">Confidence: <strong>{{ confidence }}</strong></div>

            <span class="tier-badge {% if tier == 'High Confidence' %}high{% else %}low{% endif %}">
                {{ tier }}
            </span>

            <div>
                <a class="try-again" href="/">↻ Try another image</a>
            </div>
        </div>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>
